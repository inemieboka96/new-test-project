<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Sample Hosting Test Site</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="container nav-wrapper">
            <a href="index.html" class="logo">HostTest</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="container hero-content">
                <h1>Contact Us</h1>
                <p class="hero-sub">We'd love to hear from you. Reach out to us below.</p>
            </div>
        </section>

        <section class="container page-content">
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="container"><p>&copy; 2024 Production Site. All rights reserved.</p></div>
    </footer>
</body>
</html>
